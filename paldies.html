<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You — Atelier Minimal</title>
  <style>
    :root {
      --text-light: #555;
    }
    
    body {
      font-family: 'Inter', system-ui, sans-serif;
      text-align: center;
      padding: 80px 20px 40px;
      background: #ffffff;
      color: #0f0f0f;
      min-height: 100vh;
      position: relative;           /* Important for absolute positioning */
    }

    /* Back button - Top Left */
    .back {
      position: absolute;
      top: 40px;
      left: 40px;
      color: var(--text-light);
      text-decoration: none;
      font-weight: 500;
      font-size: 1.05rem;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }

    .back:hover {
      color: #000;
    }

    h1 {
      font-size: 2.6rem;
      margin: 60px 0 16px;
    }

    p {
      font-size: 1.2rem;
      color: #555;
      max-width: 520px;
      margin: 0 auto 50px;
      line-height: 1.6;
    }

    .btn {
      background: #000;
      color: white;
      padding: 16px 48px;
      border-radius: 50px;
      text-decoration: none;
      display: inline-block;
      font-weight: 500;
      transition: all 0.25s;
    }

    .btn:hover {
      background: #222;
      transform: translateY(-2px);
    }

    @media (max-width: 600px) {
      .back {
        top: 30px;
        left: 20px;
      }
      h1 { font-size: 2.2rem; }
    }
  </style>
</head>
<body>

  <!-- Back button moved to top-left -->

  <h1>Paldies!</h1>
  <p>Tava ziņa ir saņemta un mēs ar tevi sazināsimies tuvākajā laikā.</p>
  
  <a href="index.html" class="btn">Atpakaļ</a>

</body>
</html>
